name: Bug report
description: Report something that is broken or behaving unexpectedly in SEO Video Slicer.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. SEO Video Slicer is a local
        desktop app (FastAPI + Vite/React UI + a frozen Node package kernel).
        The more precise your clip details and reproduction steps, the faster
        this gets fixed. Please do not paste secrets or private file contents.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug. What did you observe?
      placeholder: |
        e.g. After exporting, index.html renders a blank scroll-player and the
        console shows a 404 for frames/0001.webp.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Exact steps to reproduce the behavior. IMPORTANT: include the source clip's
        traits — origin (where the clip came from), duration, resolution, and fps —
        and call out which pipeline step failed: import / trim / slice / clean / export.
      placeholder: |
        Source clip: origin = phone screen-recording, duration = 6s,
        resolution = 1080x1920, fps = 30.
        Failing step: export (slice + clean succeeded).

        1. Import clip via the UI
        2. Trim to 0.0s–3.0s
        3. Slice to 24 frames
        4. Clean (default path, no premium erase)
        5. Export -> error / wrong output
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: e.g. Export should produce a valid WebP animation package that passes verify.mjs.
    validations:
      required: true

  - type: textarea
    id: verify-output
    attributes:
      label: "If package-related: `node verify.mjs` output"
      description: |
        If the bug involves a generated package, run `node verify.mjs` inside the
        package directory and paste the full output here, including which gate
        (G1–G7) failed. Leave blank if not package-related.
      render: shell
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      description: OS and version.
      placeholder: e.g. macOS 14.5 / Ubuntu 24.04 / Windows 11 (WSL2)
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version` (the app requires 3.10+).
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - Other (note in logs)
    validations:
      required: true

  - type: dropdown
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version` (the app requires Node 18+).
      options:
        - "18.x"
        - "20.x"
        - "22.x"
        - Other (note in logs)
    validations:
      required: true

  - type: input
    id: ffmpeg-version
    attributes:
      label: ffmpeg version
      description: First line of `ffmpeg -version`.
      placeholder: e.g. ffmpeg version 7.0.2
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste any relevant backend (FastAPI) logs, browser console errors, or
        terminal output. This will be automatically formatted, so no backticks needed.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this has not already been reported.
          required: true
        - label: I am running the latest `main` and can still reproduce this.
          required: true
