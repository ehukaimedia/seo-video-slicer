name: Release wheel

# When a GitHub Release is published, build the self-contained wheel (UI + kernel
# bundled in) and attach it so users can run the tool with no clone:
#   uvx --from <this-wheel-url> seo-video-slicer
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the wheel (bundles UI + kernel)
        run: bash scripts/build-wheel.sh

      - name: Upload wheel as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: backend/dist/*.whl

      - name: Attach wheel to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" backend/dist/*.whl --clobber
