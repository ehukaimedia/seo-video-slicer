<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Scroll Animation</title>
<meta name="description" content="A self-contained WebP scroll animation. Scroll to scrub through the frame sequence; reduced-motion shows a single static hero frame.">
<style>
  /* Brand-neutral, near-black stage. The frames are the hero. System fonts only.
     No accent color is imposed on the host — downstream customizes via safe_zones. */
  :root {
    --stage: oklch(13% 0.005 270);   /* near-black neutral media stage */
    --stage-deep: oklch(11% 0.005 270);
    --ink: oklch(96% 0 0);           /* high-contrast neutral text */
    --ink-quiet: oklch(72% 0 0);     /* visually-quiet caption ink */
    --hair: oklch(100% 0 0 / 0.14);  /* restrained hairline */
    --pad: clamp(16px, 4vw, 40px);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--stage-deep);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Visually-hidden description for assistive tech and meaningful page semantics. */
  .vh {
    position: absolute;
    width: 1px; height: 1px;
    margin: -1px; padding: 0; border: 0;
    clip: rect(0 0 0 0);
    clip-path: inset(50%);
    overflow: hidden; white-space: nowrap;
  }

  /* Tall scroll spacer: gives the sticky stage room to scrub across its length. */
  .scroll-spacer {
    position: relative;
    height: 320vh;                 /* SAFE_ZONE: scroll distance / container height */
  }

  /* Sticky full-viewport stage. The canvas is pinned while the spacer scrolls past. */
  .stage {
    position: sticky;
    top: 0;
    height: 100vh;
    width: 100%;
    display: grid;
    place-items: center;
    background: var(--stage);
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Thin, restrained preload progress. Fades out when complete. */
  .progress {
    position: fixed;
    left: 0; top: 0;
    height: 2px;
    width: 0%;
    background: var(--ink);
    opacity: 0.85;
    transition: width 180ms linear, opacity 420ms ease;
    z-index: 4;
    pointer-events: none;
  }
  .progress.done { opacity: 0; }

  /* Optional restrained headline overlay. SAFE_ZONE: downstream edits copy here.
     Default copy is a single neutral placeholder explained in README. */
  .headline {
    position: fixed;
    left: var(--pad);
    bottom: var(--pad);
    max-width: min(46ch, 80vw);
    margin: 0;
    z-index: 3;
    font-size: clamp(15px, 2.4vw, 22px);
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: 0.01em;
    color: var(--ink);
    text-shadow: 0 1px 16px oklch(0% 0 0 / 0.55);  /* contrast over any frame */
    pointer-events: none;
  }

  /* Tasteful no-frames static state (shown when FRAMES is empty / not yet injected). */
  .empty {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    text-align: center;
    padding: var(--pad);
    z-index: 2;
  }
  .empty[data-on="1"] { display: grid; }
  .empty p {
    margin: 0;
    max-width: 40ch;
    color: var(--ink-quiet);
    font-size: clamp(14px, 2.2vw, 18px);
    line-height: 1.5;
  }
  .empty .mark {
    display: block;
    width: 48px; height: 48px;
    margin: 0 auto 18px;
    border: 1px solid var(--hair);
    border-radius: 2px;
  }

  /* Reduced motion: no scroll-scrubbing. Collapse the spacer to a single screen,
     pin one static hero frame; the piece still reads. */
  @media (prefers-reduced-motion: reduce) {
    .scroll-spacer { height: 100vh; }
    .progress { display: none; }
  }
</style>
</head>
<body>
  <!-- Player root: hosts the canvas + scroll container, carries the template id
       that anchors the package fingerprint (G4/G5). -->
  <main id="player" data-template-id="seo-video-slicer.scroll.v1">
    <p class="vh" id="player-desc">
      Scroll animation built from a WebP frame sequence. Scroll down to scrub through the frames.
      If you prefer reduced motion, a single static hero frame is shown instead.
    </p>

    <div class="progress" id="progress" aria-hidden="true"></div>

    <div class="scroll-spacer" id="spacer">
      <div class="stage" aria-hidden="true">
        <canvas id="frame-canvas"></canvas>
      </div>
    </div>

    <!-- Optional restrained headline overlay (SAFE_ZONE: headline/overlay copy). -->
    <p class="headline" id="headline" hidden></p>

    <!-- Tasteful fallback when no frames are present (e.g. uninjected preview). -->
    <div class="empty" id="empty" role="status">
      <p><span class="mark" aria-hidden="true"></span>No frames yet. This is the reference player; a built package injects its frame sequence here.</p>
    </div>
  </main>

  <script>
  (function () {
    "use strict";

    // ---- Frame list injection -------------------------------------------------
    // The packager replaces the token below with the comma-separated, double-quoted
    // relative frame paths (no brackets, no trailing comma). Uninjected, this is an
    // empty array and the player renders a tasteful no-frames state instead of crashing.
    const FRAMES = ["./frames/frame_000.webp","./frames/frame_001.webp","./frames/frame_002.webp","./frames/frame_003.webp","./frames/frame_004.webp","./frames/frame_005.webp","./frames/frame_006.webp","./frames/frame_007.webp","./frames/frame_008.webp","./frames/frame_009.webp","./frames/frame_010.webp","./frames/frame_011.webp","./frames/frame_012.webp","./frames/frame_013.webp","./frames/frame_014.webp","./frames/frame_015.webp","./frames/frame_016.webp","./frames/frame_017.webp","./frames/frame_018.webp","./frames/frame_019.webp","./frames/frame_020.webp","./frames/frame_021.webp","./frames/frame_022.webp","./frames/frame_023.webp","./frames/frame_024.webp","./frames/frame_025.webp","./frames/frame_026.webp","./frames/frame_027.webp","./frames/frame_028.webp","./frames/frame_029.webp"];

    const player   = document.getElementById("player");
    const canvas   = document.getElementById("frame-canvas");
    const ctx      = canvas.getContext("2d");
    const spacer   = document.getElementById("spacer");
    const progress = document.getElementById("progress");
    const empty    = document.getElementById("empty");

    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    // Hero frame index for static / reduced-motion render: the middle frame reads best.
    const heroIndex = FRAMES.length ? Math.floor((FRAMES.length - 1) / 2) : 0;

    let images = [];        // decoded Image objects, index-aligned to FRAMES
    let loaded = 0;         // onload + onerror both increment this (404 never freezes)
    let currentImg = null;  // last successfully drawn image (for resize redraw)
    let dpr = 1;
    let ticking = false;    // rAF throttle guard

    // ---- No-frames state ------------------------------------------------------
    if (FRAMES.length === 0) {
      empty.setAttribute("data-on", "1");
      progress.classList.add("done");
      return; // nothing to preload, scrub, or draw — leave a calm static state
    }

    // ---- Canvas: DPR scaling --------------------------------------------------
    function sizeCanvas() {
      dpr = Math.max(1, window.devicePixelRatio || 1);
      const clientW = canvas.clientWidth;
      const clientH = canvas.clientHeight;
      canvas.width = clientW * dpr;
      canvas.height = clientH * dpr;
      // Setting canvas.width resets the transform, so re-apply DPR scaling here.
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }

    // ---- Cover-fit single-canvas render --------------------------------------
    // scale = max(cw/iw, ch/ih); image centered. No duplicate blurred background.
    function drawCover(img) {
      if (!img || !img.naturalWidth) return;
      const cw = canvas.clientWidth;
      const ch = canvas.clientHeight;
      const iw = img.naturalWidth;
      const ih = img.naturalHeight;
      const scale = Math.max(cw/iw, ch/ih);
      const dw = iw * scale;
      const dh = ih * scale;
      const dx = (cw - dw) / 2;
      const dy = (ch - dh) / 2;
      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(img, dx, dy, dw, dh);
    }

    function drawIndex(i) {
      const idx = Math.min(Math.max(i, 0), FRAMES.length - 1);
      const img = images[idx];
      if (img && img.naturalWidth) {
        currentImg = img;
        drawCover(img);
      } else if (currentImg) {
        // Frame not ready (or 404): hold the last good frame, never blank/freeze.
        drawCover(currentImg);
      }
    }

    // ---- Parallel preload with onerror-tolerant counter -----------------------
    function preloadAll() {
      images = new Array(FRAMES.length);
      const onSettled = function () {
        loaded += 1;
        const pct = Math.round((loaded / FRAMES.length) * 100);
        progress.style.width = pct + "%";
        if (loaded >= FRAMES.length) {
          progress.classList.add("done");
        }
      };
      for (let i = 0; i < FRAMES.length; i++) {
        const img = new Image();
        img.decoding = "async";
        // First successfully decoded hero frame paints immediately for a fast first read.
        img.onload = function () {
          if (i === heroIndex || (!currentImg && i === 0)) drawIndex(reduceMotion ? heroIndex : 0);
          onSettled();
        };
        img.onerror = onSettled; // a missing frame still advances the counter
        img.src = FRAMES[i];
        images[i] = img;
      }
    }

    // ---- Scroll mechanic: rAF-throttled scrub (no external libs, zero network) -
    function progressFromScroll() {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      if (max <= 0) return 0;
      const p = window.scrollY / max;
      return Math.min(Math.max(p, 0), 1);
    }

    function renderScroll() {
      ticking = false;
      const p = progressFromScroll();
      const frameIndex = Math.round(p * (FRAMES.length - 1));
      drawIndex(frameIndex);
    }

    function onScroll() {
      if (!ticking) {
        ticking = true;
        window.requestAnimationFrame(renderScroll);
      }
    }

    function onResize() {
      sizeCanvas();
      // Re-apply transform happens in sizeCanvas; redraw current frame so resize
      // never blanks or distorts the stage.
      if (reduceMotion) {
        drawIndex(heroIndex);
      } else if (currentImg) {
        drawCover(currentImg);
      } else {
        renderScroll();
      }
    }

    // ---- Init -----------------------------------------------------------------
    sizeCanvas();
    preloadAll();
    window.addEventListener("resize", onResize, { passive: true });

    if (reduceMotion) {
      // Reduced motion: do NOT attach the scroll driver. Render one static hero frame.
      drawIndex(heroIndex);
    } else {
      window.addEventListener("scroll", onScroll, { passive: true });
      renderScroll(); // initial paint at progress 0
    }
  })();
  </script>
</body>
</html>
